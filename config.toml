# Example configuration file for Molgenis FDP Harvester

# Table mappings for different concept types
[concept_table_link]
provenancestatement = "provenance_statement"
kind = "kind"
publisher = "publisher"
dataset = "collections"
datasetseries = "biobanks"

# Harvester configuration settings
[harvester_config]
# Whether to automatically create dataset series for datasets without one
auto_create_datasetseries = true
pid_service_url = "http://pid.eucaim.cancerimage.eu"

# URI lookup configuration - maps field names to their MOLGENIS lookup tables
# Used to resolve ontology URIs to their corresponding 'name' values by querying
# the specified table's 'ontologyTermURI' column
[harvester_config.uri_lookup_config.dataset]
spatial = "countries"
accrualPeriodicity = "Accrualperiodicity"
publishertype = "Publisher_type"
hasBirthSex = "sex"
accessRights = "accessrights"
collectionMethod = "collection_method"
hasEquipmentManufacturer = "manufacturer"
hasImageBodyPart = "body_parts"
hasImageModality = "imaging_modality"
healthCategory = "healthcategory"
healthTheme = "healththeme"
language = "language"
type = "dataset_type"
theme = "themes"
hasCondition = "disease_types"
interoperabilityLevel = "tier"
